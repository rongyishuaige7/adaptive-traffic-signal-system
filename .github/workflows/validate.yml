name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adaptive-traffic-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-and-frontend:
    name: Repository, backend and Vue frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install hardware-free Python dependencies
        run: python -m pip install -r backend/requirements-ci.txt
      - name: Run release gates and Python contracts
        env:
          VIDEO_WORKERS_ENABLED: "false"
          SIGNAL_ENGINE_ENABLED: "false"
        run: |
          python scripts/secret_scan.py
          python scripts/check_repo.py
          python -m py_compile backend/app/*.py backend/app/api/*.py backend/app/control/*.py backend/app/video/*.py simulator/*.py tests/*.py
          python -m pytest tests -q
      - name: Build Vue frontend
        working-directory: frontend
        run: npm ci --no-audit --no-fund && npm run build

  firmware:
    name: Five ESP32 firmware builds
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pinned PlatformIO
        run: python -m pip install -r .github/platformio-requirements.txt
      - name: Build N/S/E/W ESP32-CAM firmware
        env:
          PLATFORMIO_BUILD_FLAGS: '-DWIFI_SSID="CI_TEST_SSID" -DWIFI_PASS="CI_TEST_PASSWORD"'
        run: pio run -d firmware/esp32_cam
      - name: Build ESP32 light controller firmware
        env:
          PLATFORMIO_BUILD_FLAGS: '-DWIFI_SSID="CI_TEST_SSID" -DWIFI_PASS="CI_TEST_PASSWORD" -DPC_HOST="127.0.0.1"'
        run: pio run -d firmware/esp32_main
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: adaptive-traffic-firmware-${{ github.sha }}
          path: |
            firmware/esp32_cam/.pio/build/*/firmware.bin
            firmware/esp32_cam/.pio/build/*/firmware.elf
            firmware/esp32_main/.pio/build/esp32dev/firmware.bin
            firmware/esp32_main/.pio/build/esp32dev/firmware.elf
          if-no-files-found: error
          retention-days: 14
