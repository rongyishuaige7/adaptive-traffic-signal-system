<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Adaptive traffic signal prototype wiring boundary</title><desc id="desc">Source-derived boundary between four ESP32-CAM nodes, a FastAPI computer, one ESP32 controller, twelve light outputs, a TCA9548A and four OLEDs. This is not a PCB schematic.</desc>
<style>text{font-family:Inter,Arial,"Noto Sans SC",sans-serif;fill:#24292f}.h{font-size:29px;font-weight:700}.s{font-size:17px;fill:#57606a}.n{font-size:20px;font-weight:700}.p{font-size:15px}.box{fill:#fff;stroke:#8c959f;stroke-width:2;rx:16}.core{fill:#fff7ed;stroke:#f97316;stroke-width:3}.net{stroke:#0969da;stroke-width:4;fill:none}.sig{stroke:#1a7f37;stroke-width:4;fill:none}.warn{fill:#fff8c5;stroke:#d4a72c;stroke-width:2;rx:12}</style>
<rect width="1200" height="760" fill="#f6f8fa"/><text x="48" y="56" class="h">自适应交通信号教学原型 · 连接边界</text><text x="48" y="86" class="s">来自公开源码，不是 PCB 原理图；当前提交尚未完成五板端到端真机复测</text>
<rect x="55" y="145" width="300" height="410" class="box"/><text x="88" y="185" class="n">ESP32-CAM × 4</text><text x="88" y="220" class="p">N / S / E / W</text><text x="88" y="252" class="p">AI Thinker pin map</text><text x="88" y="284" class="p">DHCP + MJPEG /stream</text><text x="88" y="316" class="p">local Wi-Fi config</text><text x="88" y="365" class="p">stable supply per board</text><text x="88" y="397" class="p">exact sensors unconfirmed</text>
<rect x="450" y="145" width="300" height="410" class="box core"/><text x="487" y="185" class="n">PC · FastAPI + YOLOv8</text><text x="487" y="220" class="p">four MJPEG inputs</text><text x="487" y="252" class="p">tracking + line counting</text><text x="487" y="284" class="p">two-phase timing FSM</text><text x="487" y="316" class="p">/ws/device state output</text><text x="487" y="365" class="p">loopback by default</text><text x="487" y="397" class="p">no auth / TLS</text><path d="M355 280 H450" class="net"/>
<rect x="845" y="130" width="300" height="185" class="box"/><text x="880" y="170" class="n">ESP32 main controller</text><text x="880" y="205" class="p">WebSocket client</text><text x="880" y="237" class="p">12 GPIO light outputs</text><text x="880" y="269" class="p">disconnect requests all-red</text><path d="M750 270 H845" class="net"/>
<rect x="845" y="365" width="300" height="190" class="box"/><text x="880" y="405" class="n">Lights + display bus</text><text x="880" y="440" class="p">N/S/E/W · R/Y/G</text><text x="880" y="472" class="p">TCA9548A · address 0x70</text><text x="880" y="504" class="p">4 × SSD1306 · 0x3C</text><path d="M995 315 V365" class="sig"/>
<rect x="55" y="625" width="1090" height="82" class="warn"/><text x="85" y="658" class="n">门禁</text><text x="180" y="658" class="p">仅限桌面教学模型；核实板型、电源、限流和共地；不能用于真实道路交通控制。</text><text x="180" y="686" class="p">WS 连接、HTTP 响应或模拟器画面都不是物理灯态、检测准确率或道路安全证明。</text>
</svg>
