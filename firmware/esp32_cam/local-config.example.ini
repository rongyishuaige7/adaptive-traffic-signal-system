; Copy to local-config.ini (ignored by Git), then append:
; extra_configs = local-config.ini
; under [platformio] in your local platformio.ini copy.
; Alternatively pass these values via PLATFORMIO_BUILD_FLAGS in CI/local shell.

[local_secrets]
build_flags =
  -DWIFI_SSID=\"YOUR_WIFI_SSID\"
  -DWIFI_PASS=\"YOUR_WIFI_PASSWORD\"

; Optional static addressing belongs only in this untracked local file:
;  -DSTATIC_IP=\"YOUR_CAMERA_ADDRESS\"
;  -DSTATIC_GW=\"YOUR_GATEWAY_ADDRESS\"
;  -DSTATIC_SUBNET=\"YOUR_SUBNET_MASK\"
;  -DSTATIC_DNS=\"YOUR_DNS_ADDRESS\"
